<!DOCTYPE html>

<html>

<head>
  <title>Personal Blog</title>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <link rel="stylesheet" type="text/css" media="all" 
          data-th-href="@{/styles/main.css}" />
</head>

<body>

  <h1 data-th-text="${article.title} "></h1>
  <p data-th-text="${article.articleDate}"></p>
  <p data-th-text="${article.text}"></p>

  <ol data-th-each="title:${listOfTitles}">
    <li data-th-text="${title}"></li>

  </ol>

</body>

</html>
